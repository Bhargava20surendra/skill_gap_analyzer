{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-10">

        <div class="card p-4">
            <h3 class="fw-bold mb-4">📈 Your Progress Over Time</h3>

            <canvas id="progressChart"></canvas>
        </div>

    </div>
</div>
<!---<p>{{ history }}</p>-->
<script>
document.addEventListener("DOMContentLoaded", function() {

    const historyData = {{ history | tojson }};

    if (!historyData || historyData.length === 0) {
        console.log("No history data found");
        return;
    }

    const labels = historyData.map((item, index) =>
        item.created_at + " (" + (index + 1) + ")"
    );

    const percentages = historyData.map(item => item.percentage);

    const ctx = document.getElementById('progressChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Skill Match %',
                data: percentages,
                borderWidth: 3,
                tension: 0.3,
                fill: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    });
});
</script>
{% endblock %}
